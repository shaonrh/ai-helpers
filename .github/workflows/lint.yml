name: Lint Plugins

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  skillsaw:
    name: Skillsaw lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: stbenjam/skillsaw@269fd97ad8fe9082e7cc2f36d82eafddf7187764 # v0
        with:
          strict: true

  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check scripts are executable
        run: |
          failed=0
          for f in $(find plugins -name '*.sh' -type f); do
            if [ ! -x "$f" ]; then
              echo "ERROR: not executable: $f"
              failed=1
            fi
          done
          exit $failed

      - name: Shellcheck
        run: |
          find plugins -name '*.sh' -type f -print0 | xargs -0 shellcheck -S warning

  docs-sync:
    name: Docs up to date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check PLUGINS.md and docs/data.json are current
        run: |
          cp PLUGINS.md PLUGINS.md.bak
          cp docs/data.json docs/data.json.bak
          python3 scripts/generate_plugin_docs.py
          python3 scripts/build-website.py
          if ! diff -q PLUGINS.md PLUGINS.md.bak >/dev/null 2>&1; then
            echo "ERROR: PLUGINS.md is out of date. Run 'make update' and commit."
            diff PLUGINS.md.bak PLUGINS.md || true
            exit 1
          fi
          if ! diff -q docs/data.json docs/data.json.bak >/dev/null 2>&1; then
            echo "ERROR: docs/data.json is out of date. Run 'make update' and commit."
            diff docs/data.json.bak docs/data.json || true
            exit 1
          fi
          echo "Docs are up to date."


  settings-sync:
    name: Workflow settings in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check workflow settings.json match template
        run: |
          template=plugins/dev/templates/settings.json.template
          failed=0
          for f in workflows/quay-ticket/.claude/settings.json workflows/quay-bugfix/.claude/settings.json; do
            if ! diff -q "$template" "$f" >/dev/null 2>&1; then
              echo "ERROR: $f is out of sync with $template"
              diff "$template" "$f" || true
              failed=1
            fi
          done
          exit $failed

  tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=./ --cov-report=xml || [ $? -eq 5 ]

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
